<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIS Trading Logo - Export to JPG</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 600px;
    }
    h1 {
      color: #1A7A3C;
      margin-bottom: 20px;
    }
    #logoCanvas {
      border: 2px solid #1A7A3C;
      border-radius: 8px;
      margin: 20px 0;
    }
    button {
      background: linear-gradient(135deg, #1A7A3C, #2EAA57);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin: 10px;
      box-shadow: 0 2px 8px rgba(26,122,60,0.3);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26,122,60,0.4);
    }
    .size-selector {
      margin: 20px 0;
    }
    select {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #1A7A3C;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AIS Trading Inc Logo Exporter</h1>
    <p>Select size and download the logo as JPG</p>
    
    <div class="size-selector">
      <label for="sizeSelect">Select Size: </label>
      <select id="sizeSelect">
        <option value="512">512x512px (Web)</option>
        <option value="1024" selected>1024x1024px (Standard)</option>
        <option value="2048">2048x2048px (High Res)</option>
        <option value="4096">4096x4096px (Print)</option>
      </select>
    </div>
    
    <canvas id="logoCanvas"></canvas>
    
    <div>
      <button onclick="exportAsJPG()">Download as JPG</button>
      <button onclick="exportAsPNG()">Download as PNG</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('logoCanvas');
    const ctx = canvas.getContext('2d');
    const sizeSelect = document.getElementById('sizeSelect');

    function drawLogo(size) {
      canvas.width = size;
      canvas.height = size;
      
      // Display size
      const displaySize = Math.min(400, size);
      canvas.style.width = displaySize + 'px';
      canvas.style.height = displaySize + 'px';
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#1A7A3C');
      gradient.addColorStop(1, '#2EAA57');
      
      // Draw rounded rectangle
      const radius = size * 0.15;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();
      
      // Decorative circle
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.beginPath();
      ctx.arc(size * 0.85, size * 0.15, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      
      // Tree icon
      const centerX = size * 0.5;
      const baseY = size * 0.75;
      const topY = size * 0.25;
      const lineWidth = size * 0.035;
      
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Trunk
      ctx.beginPath();
      ctx.moveTo(centerX, baseY);
      ctx.lineTo(centerX, size * 0.4);
      ctx.stroke();
      
      // Bottom branches
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.6);
      ctx.lineTo(centerX, size * 0.4);
      ctx.lineTo(size * 0.7, size * 0.6);
      ctx.stroke();
      
      // Middle branches
      ctx.beginPath();
      ctx.moveTo(size * 0.35, size * 0.5);
      ctx.lineTo(centerX, size * 0.32);
      ctx.lineTo(size * 0.65, size * 0.5);
      ctx.stroke();
      
      // Top branches
      ctx.beginPath();
      ctx.moveTo(size * 0.4, size * 0.42);
      ctx.lineTo(centerX, topY);
      ctx.lineTo(size * 0.6, size * 0.42);
      ctx.stroke();
    }

    function exportAsJPG() {
      const size = parseInt(sizeSelect.value);
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = size;
      tempCanvas.height = size;
      const tempCtx = tempCanvas.getContext('2d');
      
      // Fill white background for JPG
      tempCtx.fillStyle = '#ffffff';
      tempCtx.fillRect(0, 0, size, size);
      
      // Redraw logo
      drawLogoOnCanvas(tempCtx, size);
      
      // Export
      tempCanvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ais-trading-logo-${size}x${size}.jpg`;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/jpeg', 0.95);
    }

    function exportAsPNG() {
      const size = parseInt(sizeSelect.value);
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = size;
      tempCanvas.height = size;
      const tempCtx = tempCanvas.getContext('2d');
      
      drawLogoOnCanvas(tempCtx, size);
      
      // Export
      tempCanvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `ais-trading-logo-${size}x${size}.png`;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function drawLogoOnCanvas(ctx, size) {
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#1A7A3C');
      gradient.addColorStop(1, '#2EAA57');
      
      const radius = size * 0.15;
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, radius);
      ctx.fill();
      
      // Decorative circle
      ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.beginPath();
      ctx.arc(size * 0.85, size * 0.15, size * 0.1, 0, Math.PI * 2);
      ctx.fill();
      
      // Tree icon
      const centerX = size * 0.5;
      const baseY = size * 0.75;
      const topY = size * 0.25;
      const lineWidth = size * 0.035;
      
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      
      // Trunk
      ctx.beginPath();
      ctx.moveTo(centerX, baseY);
      ctx.lineTo(centerX, size * 0.4);
      ctx.stroke();
      
      // Bottom branches
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.6);
      ctx.lineTo(centerX, size * 0.4);
      ctx.lineTo(size * 0.7, size * 0.6);
      ctx.stroke();
      
      // Middle branches
      ctx.beginPath();
      ctx.moveTo(size * 0.35, size * 0.5);
      ctx.lineTo(centerX, size * 0.32);
      ctx.lineTo(size * 0.65, size * 0.5);
      ctx.stroke();
      
      // Top branches
      ctx.beginPath();
      ctx.moveTo(size * 0.4, size * 0.42);
      ctx.lineTo(centerX, topY);
      ctx.lineTo(size * 0.6, size * 0.42);
      ctx.stroke();
    }

    // Initial draw
    drawLogo(1024);
    
    // Update on size change
    sizeSelect.addEventListener('change', function() {
      drawLogo(parseInt(this.value));
    });
  </script>
</body>
</html>
